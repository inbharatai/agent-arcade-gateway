name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps
        run: npm ci

      - name: Install gateway deps
        run: cd packages/gateway && bun install

      - name: Install web deps
        run: cd packages/web && npm ci

      - name: Install sdk-node deps
        run: cd packages/sdk-node && npm ci

      - name: Install sdk-browser deps
        run: cd packages/sdk-browser && npm ci

      - name: Lint web
        run: cd packages/web && npx eslint src --max-warnings 0

      - name: Typecheck web
        run: cd packages/web && npx tsc --noEmit

      - name: Build web
        env:
          NEXT_PUBLIC_GATEWAY_URL: http://localhost:47890
          GATEWAY_JWT_SECRET: ci-test-secret
          SESSION_SIGNING_SECRET: ci-sign-secret
          NEXT_PUBLIC_DEFAULT_SESSION_ID: ci-session
          NEXT_PUBLIC_LOCK_SESSION_ID: 1
        run: cd packages/web && npx next build

      - name: Start gateway
        env:
          PORT: 47890
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          REQUIRE_AUTH: 0
          ALLOWED_ORIGINS: http://localhost:47380
          ENABLE_REDIS_ADAPTER: 0
        run: |
          cd packages/gateway
          bun run src/index.ts &
          sleep 5

      - name: Gateway integration tests
        run: bun test packages/gateway/test/gateway.test.ts

      - name: Gateway agent-lifecycle tests
        run: bun test packages/gateway/test/agent-lifecycle.test.ts

      - name: Gateway WhatsApp tests
        run: bun test packages/gateway/test/whatsapp.test.ts

      - name: Store unit tests
        run: cd packages/web && bun test test/store.test.ts

      - name: i18n language tests
        run: cd packages/web && bun test test/i18n.test.ts

      - name: OpenAI adapter tests
        run: bun test packages/adapter-openai/src/index.test.ts

      - name: SDK tests
        run: |
          cd packages/sdk-node && bun test test/
          cd ../sdk-browser && bun test test/

      - name: Validate Docker build
        run: |
          docker build -f Dockerfile.gateway -t agent-arcade-gateway:test .
          docker build -f Dockerfile.web -t agent-arcade-web:test .

      - name: Secure-mode capabilities check
        env:
          PORT: 47890
          NODE_ENV: production
          REDIS_URL: redis://localhost:6379
          REQUIRE_AUTH: 1
          JWT_SECRET: ci-prod-jwt-secret
          SESSION_SIGNING_SECRET: ci-prod-sign-secret
          ALLOWED_ORIGINS: http://localhost:47380
          ENABLE_REDIS_ADAPTER: 0
        run: |
          pkill -f "bun run src/index.ts" || true
          cd packages/gateway
          bun run src/index.ts &
          sleep 5
          node -e "(async()=>{const r=await fetch('http://localhost:47890/v1/capabilities'); if(!r.ok){throw new Error('capabilities HTTP '+r.status)}; const c=await r.json(); if(!(c?.auth?.required===true && c?.auth?.sessionSignature===true)){throw new Error('secure capabilities check failed: '+JSON.stringify(c?.auth))}; console.log('SECURE_CAPABILITIES_OK', JSON.stringify(c.auth)); })().catch(e=>{console.error(e.message); process.exit(1);})"
