# fly.toml — Agent Arcade Gateway + Demo Bot deployment
# Deploy with:  fly deploy --dockerfile Dockerfile.demo

app            = "agent-arcade-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.demo"

[env]
  PORT      = "3000"
  NODE_ENV  = "production"
  DEMO_BOT  = "1"
  CYCLE_MS  = "300000"
  # Persistent SQLite — set via fly secrets or keep default /data/arcade.db
  # DB_PATH is pre-set in Dockerfile to /data/arcade.db

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

# Persistent volume for SQLite database (survives deploys and restarts)
[mounts]
  source      = "arcade_data"
  destination = "/data"
  initial_size = "1gb"
