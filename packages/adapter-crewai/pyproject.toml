[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-arcade-crewai"
version = "1.0.0"
description = "CrewAI adapter for Agent Arcade -- auto-instruments crews, agents, and tasks"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
crewai = ["crewai>=0.28.0"]
all = ["crewai>=0.28.0", "python-socketio[client]>=5.0.0"]

[tool.setuptools.packages.find]
include = ["agent_arcade_crewai*"]
