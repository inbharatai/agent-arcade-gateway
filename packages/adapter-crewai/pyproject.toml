[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-arcade-crewai"
version = "3.5.0"
description = "CrewAI adapter for Agent Arcade — real-time agent visualization"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["agent-arcade", "crewai", "telemetry", "ai-agents", "observability"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
crewai = ["crewai>=0.28.0"]
all = ["crewai>=0.28.0", "python-socketio[client]>=5.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["agent_arcade_crewai"]
