[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-arcade-autogen"
version = "1.0.0"
description = "AutoGen adapter for Agent Arcade -- auto-instruments multi-agent conversations"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
autogen = ["pyautogen>=0.2.0"]
all = ["pyautogen>=0.2.0", "python-socketio[client]>=5.0.0"]

[tool.setuptools.packages.find]
include = ["agent_arcade_autogen*"]
