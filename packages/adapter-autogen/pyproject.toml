[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-arcade-autogen"
version = "3.7.3"
description = "AutoGen adapter for Agent Arcade — real-time agent visualization"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
keywords = ["agent-arcade", "autogen", "telemetry", "ai-agents", "observability"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = ["requests>=2.28.0"]

[project.optional-dependencies]
autogen = ["pyautogen>=0.2.0"]
autogen4 = ["autogen-agentchat>=0.4.0"]
all = ["pyautogen>=0.2.0", "python-socketio[client]>=5.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["agent_arcade_autogen"]
