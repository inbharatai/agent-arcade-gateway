[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "agent-arcade"
version = "1.0.0"
description = "Python SDK for Agent Arcade — universal agent telemetry & visualization"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
socketio = ["python-socketio[client]>=5.0"]

[tool.setuptools.packages.find]
include = ["agent_arcade*"]
