<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="waGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25d366"/>
      <stop offset="100%" stop-color="#128c7e"/>
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrowGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#25d366"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="arrowGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#25d366" stroke-width="0.5">
    <line x1="0" y1="60" x2="960" y2="60"/><line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="180" x2="960" y2="180"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="300" x2="960" y2="300"/><line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="120" y1="0" x2="120" y2="420"/><line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/><line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/><line x1="720" y1="0" x2="720" y2="420"/>
    <line x1="840" y1="0" x2="840" y2="420"/>
  </g>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff" filter="url(#glow)">
    WhatsApp Agent Control
  </text>
  <text x="480" y="62" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8892b0" letter-spacing="3">
    SCAN QR &#x2022; CONTROL ANY AI AGENT &#x2022; NO TWILIO &#x2022; NO API KEYS
  </text>

  <!-- ═══ LEFT: Your Phone ═══ -->
  <rect x="40" y="90" width="220" height="280" rx="14" fill="#111122" stroke="#25d366" stroke-width="2" opacity="0.9"/>
  <rect x="40" y="90" width="220" height="44" rx="14" fill="url(#waGrad)" opacity="0.15"/>
  <text x="60" y="119" font-size="22">&#x1F4F1;</text>
  <text x="88" y="119" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#25d366">Your WhatsApp</text>

  <!-- Chat messages -->
  <rect x="60" y="148" width="180" height="28" rx="10" fill="#005c4b"/>
  <text x="72" y="166" font-family="'Courier New', monospace" font-size="10" fill="#e9edef">pause my-session agent-1</text>

  <rect x="60" y="184" width="180" height="28" rx="10" fill="#1a1a2e"/>
  <text x="72" y="202" font-family="'Courier New', monospace" font-size="10" fill="#8696a0">&#x2705; Agent paused successfully</text>

  <rect x="60" y="220" width="180" height="28" rx="10" fill="#005c4b"/>
  <text x="72" y="238" font-family="'Courier New', monospace" font-size="10" fill="#e9edef">redirect agent-1: use JWT</text>

  <rect x="60" y="256" width="180" height="28" rx="10" fill="#1a1a2e"/>
  <text x="72" y="274" font-family="'Courier New', monospace" font-size="10" fill="#8696a0">&#x2705; Redirected with new task</text>

  <rect x="60" y="292" width="180" height="28" rx="10" fill="#005c4b"/>
  <text x="72" y="310" font-family="'Courier New', monospace" font-size="10" fill="#e9edef">list my-session</text>

  <rect x="60" y="328" width="180" height="28" rx="10" fill="#1a1a2e"/>
  <text x="72" y="346" font-family="'Courier New', monospace" font-size="9" fill="#8696a0">&#x1F7E2; agent-1 (writing) &#x1F534; agent-2</text>

  <!-- ═══ Arrow 1: Phone → Gateway ═══ -->
  <line x1="270" y1="230" x2="360" y2="230" stroke="url(#arrowGrad1)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="360,223 375,230 360,237" fill="#f97316" filter="url(#glow)"/>
  <rect x="280" y="200" width="80" height="20" rx="4" fill="#1a1a2e" stroke="#25d366" stroke-width="1"/>
  <text x="320" y="214" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#25d366">Baileys WS</text>

  <!-- ═══ CENTER: Gateway ═══ -->
  <rect x="380" y="90" width="200" height="280" rx="14" fill="#111122" stroke="#f97316" stroke-width="2" opacity="0.9"/>
  <rect x="380" y="90" width="200" height="44" rx="14" fill="url(#gwGrad)" opacity="0.15"/>
  <text x="400" y="119" font-size="22">&#x26A1;</text>
  <text x="428" y="119" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#f97316">Gateway</text>
  <text x="520" y="119" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#666">:47890</text>

  <!-- Gateway features -->
  <rect x="400" y="148" width="160" height="36" rx="6" fill="#0d1117" stroke="#f97316" stroke-width="1"/>
  <text x="415" y="164" font-size="12">&#x1F50D;</text>
  <text x="432" y="164" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f97316">Parse Command</text>
  <text x="432" y="176" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#555">pause | stop | redirect | list</text>

  <rect x="400" y="194" width="160" height="36" rx="6" fill="#0d1117" stroke="#ef4444" stroke-width="1"/>
  <text x="415" y="210" font-size="12">&#x1F6E1;</text>
  <text x="432" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ef4444">Auth Check</text>
  <text x="432" y="222" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#555">WHATSAPP_ALLOWED_NUMBERS</text>

  <rect x="400" y="240" width="160" height="36" rx="6" fill="#0d1117" stroke="#6366f1" stroke-width="1"/>
  <text x="415" y="256" font-size="12">&#x1F3AF;</text>
  <text x="432" y="256" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6366f1">Route to Agent</text>
  <text x="432" y="268" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#555">/v1/agents/:session/:id/:action</text>

  <rect x="400" y="286" width="160" height="36" rx="6" fill="#0d1117" stroke="#22c55e" stroke-width="1"/>
  <text x="415" y="302" font-size="12">&#x1F4E4;</text>
  <text x="432" y="302" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#22c55e">Respond</text>
  <text x="432" y="314" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#555">Send result back to WhatsApp</text>

  <!-- QR scan box -->
  <rect x="400" y="332" width="160" height="28" rx="6" fill="#0a0a15" stroke="#25d366" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="480" y="350" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#25d366">QR in terminal + dashboard</text>

  <!-- ═══ Arrow 2: Gateway → Agents ═══ -->
  <line x1="590" y1="230" x2="680" y2="170" stroke="url(#arrowGrad2)" stroke-width="2" filter="url(#glow)"/>
  <line x1="590" y1="230" x2="680" y2="230" stroke="url(#arrowGrad2)" stroke-width="2" filter="url(#glow)"/>
  <line x1="590" y1="230" x2="680" y2="290" stroke="url(#arrowGrad2)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="680,163 695,170 680,177" fill="#8b5cf6" filter="url(#glow)"/>
  <polygon points="680,223 695,230 680,237" fill="#8b5cf6" filter="url(#glow)"/>
  <polygon points="680,283 695,290 680,297" fill="#8b5cf6" filter="url(#glow)"/>

  <!-- ═══ RIGHT: Any Framework Agents ═══ -->
  <rect x="700" y="90" width="220" height="280" rx="14" fill="#111122" stroke="#8b5cf6" stroke-width="2" opacity="0.9"/>
  <rect x="700" y="90" width="220" height="44" rx="14" fill="url(#agentGrad)" opacity="0.15"/>
  <text x="720" y="119" font-size="22">&#x1F916;</text>
  <text x="748" y="119" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#a78bfa">Any AI Agent</text>

  <!-- Agent cards -->
  <rect x="720" y="148" width="180" height="40" rx="6" fill="#0d1117" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="735" y="165" font-size="11">&#x1F7E3;</text>
  <text x="752" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#c084fc">Claude Code</text>
  <text x="752" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#555">Hooks &#x2192; PreToolUse / PostToolUse</text>

  <rect x="720" y="198" width="180" height="40" rx="6" fill="#0d1117" stroke="#10a37f" stroke-width="1.5"/>
  <text x="735" y="215" font-size="11">&#x1F7E2;</text>
  <text x="752" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#10a37f">OpenAI GPT-4o</text>
  <text x="752" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#555">wrapOpenAI() &#x2192; streaming tracked</text>

  <rect x="720" y="248" width="180" height="40" rx="6" fill="#0d1117" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="735" y="265" font-size="11">&#x1F9BE;</text>
  <text x="752" y="266" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#ff9f1c">OpenClaw</text>
  <text x="752" y="280" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#555">Brain + Skills + Memory + Channels</text>

  <rect x="720" y="298" width="180" height="40" rx="6" fill="#0d1117" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="735" y="315" font-size="11">&#x1F7E0;</text>
  <text x="752" y="316" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#ff6b6b">LangChain / CrewAI</text>
  <text x="752" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#555">Callback handler &#x2192; all events</text>

  <rect x="720" y="348" width="180" height="18" rx="4" fill="#0a0a15" stroke="#444" stroke-width="0.5"/>
  <text x="810" y="360" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#666">+ Ollama, Mistral, Cursor, Aider...</text>

  <!-- Bottom bar -->
  <rect x="0" y="388" width="960" height="32" fill="#0a0a12" opacity="0.8"/>
  <text x="480" y="409" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#555">
    No Twilio  |  No paid APIs  |  Your personal WhatsApp  |  Scan once, persists across restarts  |  Works with ANY connected framework
  </text>
</svg>
