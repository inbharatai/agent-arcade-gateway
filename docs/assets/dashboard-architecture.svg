  <rect x="40" y="414" width="820" height="80" rx="6" fill="url(#game)" stroke="#8b5cf640"/>
  <text x="450" y="412" text-anchor="middle" fill="#8b5cf680" font-size="8" font-weight="600">GAME PANEL — GAMIFICATION ENGINE v3.0</text>
