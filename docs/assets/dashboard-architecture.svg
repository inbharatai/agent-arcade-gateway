  <!-- Main Container -->
  <rect x="30" y="45" width="840" height="455" rx="8" fill="#0d0d2010" stroke="#ffffff10" stroke-width="1"/>

  <!-- HEADER BAR -->
  <rect x="40" y="55" width="820" height="40" rx="6" fill="url(#header)" stroke="#8b5cf640"/>
  <text x="55" y="79" fill="#c4b5fd" font-size="11" font-weight="700">🕹️ MISSION: my-session</text>
  <circle cx="260" cy="75" r="4" fill="#10b981"/>
  <text x="270" y="79" fill="#6ee7b7" font-size="10">LIVE</text>
  <text x="330" y="79" fill="#94a3b8" font-size="10">3 agents</text>
  <!-- Header buttons -->
