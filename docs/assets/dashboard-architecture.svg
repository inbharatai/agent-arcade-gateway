  <text x="75" y="436" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">⭐ XP</text>
  <rect x="106" y="422" width="82" height="20" rx="3" fill="#ffffff08"/>
  <text x="147" y="436" text-anchor="middle" fill="#94a3b8" font-size="9">🏆 Achieve</text>
  <rect x="194" y="422" width="80" height="20" rx="3" fill="#ffffff08"/>
  <text x="234" y="436" text-anchor="middle" fill="#94a3b8" font-size="9">📈 Leader</text>
  <rect x="280" y="422" width="62" height="20" rx="3" fill="#ffffff08"/>
  <text x="311" y="436" text-anchor="middle" fill="#94a3b8" font-size="9">💰 Costs</text>
  <rect x="348" y="422" width="70" height="20" rx="3" fill="#ffffff08"/>
  <text x="383" y="436" text-anchor="middle" fill="#94a3b8" font-size="9">⏪ Replay</text>

  <!-- XP Content -->
  <text x="55" y="462" fill="#e2e8f0" font-size="9">⚡ Claude Code</text>
  <rect x="140" y="454" width="200" height="10" rx="3" fill="#ffffff08"/>
  <rect x="140" y="454" width="150" height="10" rx="3" fill="url(#accentPurple)"/>
  <text x="345" y="463" fill="#c4b5fd" font-size="8">Lv.4 Adept — 3,200 XP</text>
  <text x="530" y="463" fill="#f59e0b" font-size="8">🔥 Streak: 5 days (1.5x)</text>

  <text x="55" y="480" fill="#e2e8f0" font-size="9">🔧 GPT Worker</text>
  <rect x="140" y="472" width="200" height="10" rx="3" fill="#ffffff08"/>
  <rect x="140" y="472" width="90" height="10" rx="3" fill="url(#accentOrange)"/>
  <text x="345" y="481" fill="#fcd34d" font-size="8">Lv.3 Journeyman — 1,800 XP</text>

