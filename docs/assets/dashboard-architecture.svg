  <text x="635" y="318" fill="#f59e0b" font-size="10" font-weight="700">🏆 Achievement Unlocked!</text>
  <text x="635" y="333" fill="#fcd34d" font-size="9">Tool Master — 10 unique tools used</text>

  <!-- Level Up Toast -->
