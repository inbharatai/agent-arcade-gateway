  <!-- Agent 2 -->
  <rect x="48" y="180" width="124" height="48" rx="4" fill="#ffffff05"/>
  <text x="58" y="195" fill="#e2e8f0" font-size="10">🔧 GPT Worker</text>
  <text x="58" y="207" fill="#60a5fa" font-size="8">🤖 gpt-4o</text>
  <text x="58" y="219" fill="#a78bfa" font-size="8">🎯 Writing tests</text>
  <circle cx="62" cy="226" r="3" fill="#f59e0b"/>
  <!-- Agent 3 -->
  <rect x="48" y="234" width="124" height="48" rx="4" fill="#ffffff05"/>
  <text x="58" y="249" fill="#e2e8f0" font-size="10">🐾 OpenClaw</text>
  <text x="58" y="261" fill="#60a5fa" font-size="8">🤖 openclaw-react</text>
  <text x="58" y="273" fill="#a78bfa" font-size="8">🎯 Research task</text>
  <circle cx="62" cy="280" r="3" fill="#10b981"/>
