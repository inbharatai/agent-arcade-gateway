  <text x="680" y="138" fill="#94a3b8" font-size="9">State: writing</text>
  <text x="680" y="152" fill="#94a3b8" font-size="9">Model: claude-sonnet-4</text>
  <text x="680" y="166" fill="#94a3b8" font-size="9">Task: Implementing feature</text>
