  <text x="775" y="464" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700">💰 SESSION COST</text>
  <text x="775" y="480" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">$0.0127</text>

  <!-- Achievement Toast (floating) -->
