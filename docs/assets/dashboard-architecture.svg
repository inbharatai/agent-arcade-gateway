  <text x="680" y="220" fill="#94a3b8" font-size="9">Messages: 8</text>
  <text x="680" y="234" fill="#94a3b8" font-size="9">Errors: 0</text>
  <text x="680" y="248" fill="#94a3b8" font-size="9">Trust: 92%</text>
  <!-- Trust bar -->
