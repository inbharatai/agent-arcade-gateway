    <circle cx="220" cy="140" r="1"/><circle cx="240" cy="140" r="1"/><circle cx="260" cy="140" r="1"/><circle cx="280" cy="140" r="1"/><circle cx="300" cy="140" r="1"/>
    <circle cx="320" cy="140" r="1"/><circle cx="340" cy="140" r="1"/><circle cx="360" cy="140" r="1"/><circle cx="380" cy="140" r="1"/><circle cx="400" cy="140" r="1"/>
    <circle cx="220" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="260" cy="160" r="1"/><circle cx="280" cy="160" r="1"/><circle cx="300" cy="160" r="1"/>
