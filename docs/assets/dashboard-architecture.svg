  <text x="680" y="290" fill="#f59e0b" font-size="9">💰 Cost: $0.0042</text>

  <!-- MISSION FEED (ticker) -->
  <rect x="40" y="385" width="820" height="24" rx="4" fill="#0d0d2080" stroke="#ffffff08"/>
  <text x="55" y="401" fill="#f59e0b" font-size="9" font-weight="700">FEED</text>
  <text x="95" y="401" fill="#94a3b8" font-size="9">Claude Code → writing "Implementing API endpoint"</text>
  <text x="840" y="401" text-anchor="end" fill="#64748b" font-size="8">42 events</text>
  <text x="450" y="383" text-anchor="middle" fill="#8b5cf680" font-size="8" font-weight="600">LIVE FEED TICKER</text>

