  <text x="652" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">🎨</text>
  <rect x="670" y="62" width="24" height="24" rx="4" fill="#ffffff08" stroke="#ffffff15"/>
  <text x="682" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">📊</text>
  <rect x="700" y="62" width="24" height="24" rx="4" fill="#ffffff08" stroke="#ffffff15"/>
  <text x="712" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">📜</text>
  <rect x="730" y="62" width="24" height="24" rx="4" fill="#8b5cf630" stroke="#8b5cf6"/>
  <text x="742" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">🎮</text>
  <rect x="760" y="62" width="24" height="24" rx="4" fill="#ffffff08" stroke="#ffffff15"/>
  <text x="772" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">⚙️</text>
  <rect x="790" y="62" width="24" height="24" rx="4" fill="#ffffff08" stroke="#ffffff15"/>
  <text x="802" y="79" text-anchor="middle" fill="#e2e8f0" font-size="11">🐛</text>
  <!-- Label -->
  <text x="840" y="52" text-anchor="end" fill="#8b5cf680" font-size="8" font-weight="600">HEADER</text>

  <!-- MAIN AREA (flex row) -->
  <!-- Agent Roster Sidebar -->
  <rect x="40" y="100" width="140" height="280" rx="6" fill="#0d0d2060" stroke="#ffffff10"/>
  <text x="50" y="118" fill="#94a3b8" font-size="8" font-weight="700" letter-spacing="1.5">AGENT ROSTER</text>
  <!-- Agent 1 -->
  <rect x="48" y="126" width="124" height="48" rx="4" fill="#ffffff08" stroke="#8b5cf640"/>
  <text x="58" y="141" fill="#e2e8f0" font-size="10">⚡ Claude Code</text>
  <text x="58" y="153" fill="#60a5fa" font-size="8">🤖 claude-sonnet-4</text>
  <text x="58" y="165" fill="#a78bfa" font-size="8">🎯 Implementing API</text>
